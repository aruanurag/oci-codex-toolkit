interface:
  display_name: "OCI Architecture PPT"
  short_description: "Generate OCI physical PowerPoint architectures"
  default_prompt: "Use $oci-architecture-powerpoint-generator to design an OCI physical architecture as a finalized PowerPoint. Begin with a short plan and a clarifying-question gate before authoring the actual diagram, select the closest bundled Oracle reference architecture as the baseline, ask only the smallest useful set of clarification questions when the remaining ambiguity would materially change topology, networking, DR posture, service meaning, or icon mapping, and explicitly say when there are no blocking questions. If a direct icon is missing or you do not fully understand the requested component, pause and present one to three recommended icon or placeholder options with the most honest fit first instead of silently guessing. Then map the workload to Oracle PowerPoint icons, keep gateways centered on the VCN border, keep icons centered within their containers, use one visible connector per semantic relationship, and render a finalized .pptx only after repeated render-review passes and an architectural review have removed misleading public or private placement, overlapping lines, diagonal or stitched connectors, detached-looking arrowheads, duplicate control markers, spilled child elements, and sloppy label spacing."
