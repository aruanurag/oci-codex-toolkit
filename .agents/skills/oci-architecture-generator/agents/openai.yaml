interface:
  display_name: "OCI Architecture"
  short_description: "Generate OCI physical draw.io architectures"
  default_prompt: "Use $oci-architecture-generator to design an OCI physical architecture, start from the closest bundled Oracle reference architecture, add supporting bundled references only when they cover DR, security, or workload-specific details better, map the workload to approved draw.io icons, route every cross-container physical flow through hidden boundary anchors, place Internet/NAT/Service Gateways directly on the relevant boundary instead of drawing decorative stub lines, use the official Container Engine for Kubernetes icon as the emblem for any OKE cluster container, hide the OKE icon's internal snippet label when that icon is serving as a cluster badge or header marker, keep arrowheads only on final destination segments, and produce a finalized .drawio diagram only after repeated render-review passes have removed overlapping lines, diagonal or stacked traffic arrows, stretched icons, detached-looking arrowheads, and connectors that only almost reach subnet or service boundaries. Use the renderer quality gate and require two consecutive clean reviews before sharing the result."
